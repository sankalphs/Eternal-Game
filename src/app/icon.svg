<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0606"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="ember" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- dark backdrop -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- crescent moon / shadow halo -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#7f1d1d" stroke-width="0.6" opacity="0.6"/>
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="#991b1b" stroke-width="0.4" opacity="0.5"/>

  <!-- silhouette head -->
  <circle cx="16" cy="13" r="3.4" fill="#0a0a0a" stroke="url(#ember)" stroke-width="0.5"/>

  <!-- silhouette torso -->
  <path d="M 10.5 17 Q 16 16.2 21.5 17 L 22.5 24 L 9.5 24 Z" fill="#0a0a0a" stroke="url(#ember)" stroke-width="0.5"/>

  <!-- glowing eyes -->
  <circle cx="14.7" cy="12.8" r="0.55" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="17.3" cy="12.8" r="0.55" fill="#fbbf24" filter="url(#glow)"/>

  <!-- diagonal blade slash -->
  <line x1="6" y1="26" x2="26" y2="6" stroke="url(#ember)" stroke-width="2.2" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="6" y1="26" x2="26" y2="6" stroke="#fff7ed" stroke-width="0.7" stroke-linecap="round" opacity="0.9"/>
</svg>